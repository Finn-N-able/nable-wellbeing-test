<script>
window.storage = {
  get: function(key) {
    return new Promise(function(resolve, reject) {
      try {
        var val = localStorage.getItem(key);
        resolve(val ? { key: key, value: val, shared: false } : null);
      } catch(e) { reject(e); }
    });
  },
  set: function(key, value) {
    return new Promise(function(resolve, reject) {
      try {
        localStorage.setItem(key, value);
        resolve({ key: key, value: value, shared: false });
      } catch(e) { reject(e); }
    });
  },
  delete: function(key) {
    return new Promise(function(resolve, reject) {
      try {
        localStorage.removeItem(key);
        resolve({ key: key, deleted: true, shared: false });
      } catch(e) { reject(e); }
    });
  },
  list: function(prefix) {
    return new Promise(function(resolve) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (!prefix || k.indexOf(prefix) === 0) keys.push(k);
      }
      resolve({ keys: keys });
    });
  }
};

/* ═══════════════════════════════════════════════════════════════════

function makePersonalisedPlan(surgType, weekNum, maxWeeks, side, painLevel, assessments, outcomes, conditions, equipAids, bodyMap, uploadedDocs, achieved) {

  var redZones = [];

  /* ── Derive room scan equipment ── */
  var scannedRooms = (equipAids || []).map(function(e) { return e.room; });
  var essentialMissing = [];
  var recommendedMissing = [];
  var optionalMissing = [];
  var safetyIssues = [];
  var roomSummaries = [];
  (equipAids || []).forEach(function(e) {

      var roomEss = 0, roomRec = 0;

        var item = s.name + (s.note ? " — " + s.note : "");

        else if (s.priority === "Recommended") { recommendedMissing.push(item + " (" + e.room + ")"); roomRec++; }
        else { optionalMissing.push(item + " (" + e.room + ")"); }
        if (s.category === "Safety") { safetyIssues.push(item + " (" + e.room + ")"); }
      });
      var total = 0;
      var checks = ROOM_CHECKS[e.room];
      if (checks) total = checks.items.length;
      var okN = total - (roomEss + roomRec + (e.results.suggestions.length - roomEss - roomRec));

  /* ── Derive outcome categories in play ── */
  var outCats = {};

  if (weakAdls.length > 0) {

  } else if (earlyWeeks) {
    todayParts.push("Focus on settling into your daily routine, getting comfortable moving around your home, and building confidence.");
  } else if (lateWeeks) {
    todayParts.push("Build towards greater independence in your daily routine and community activities.");
  } else {
    todayParts.push("Keep building your daily living confidence step by step.");
  }
  if (redZones.length > 0) {
    todayParts.push("Take care with " + redZones.slice(0, 2).join(" and ") + " — you're struggling here. Consider talking to someone about how you're feeling.");
  }
  var todaySummary = todayParts.join(" ");

  /* ═══ BUILD BODY MAP INSIGHTS (extra section) ═══ */
  var bodyInsights = null;
  if (redZones.length > 0 || amberZones.length > 0) {
    bodyInsights = {
      title: "Body Map Findings",
      red: redZones,
      amber: amberZones,
      advice: redZones.length > 0
        ? "You're struggling with: " + redZones.join(", ") + ". Consider talking to someone about how you're feeling."
        : "You're noticing something with: " + amberZones.join(", ") + ". Keep checking in with yourself."
    };
  }

  return {
    summary: summary,
    goals: goals,
    equipment: equipment,
    todaySummary: todaySummary,
    bodyInsights: bodyInsights,
    conditionNotes: condNames.length > 0 ? condNames : null,
    scannedRooms: scannedRooms.length > 0 ? scannedRooms : null,
    roomAssessment: roomSummaries.length > 0 ? {
      rooms: roomSummaries,
      essentialMissing: essentialMissing,
      recommendedMissing: recommendedMissing,
      safetyIssues: safetyIssues,
      totalActions: essentialMissing.length + recommendedMissing.length + optionalMissing.length
    } : null,
  };
}

function genDailyTasks(outcomes,surg,week,aAdl){
  var t=[];var j=surg==="THR"?"hip":surg==="TKR"?"knee":"joint";var early=week<=2;

    }

      t.push({id:"dt_walk_"+o.id,text:early?"Walk to kitchen and back 3 times using your walking aid":"Walk outdoors for 10-15 minutes on flat ground",detail:early?"Focus on heel-toe pattern. Rest if tired.":"Choose flat route. Use walking aid if prescribed.",cat:"Mobility",icon:"\u{1F6B6}",period:"afternoon"});

      if(c2==="Personal Care") t.push({id:"dt_dress_"+o.id,text:"Get dressed independently \u2014 operated leg first for trousers",detail:"Sit on bed edge. Operated leg first into trouser leg. Use reacher for items on floor.",cat:"ADL",icon:"\u{1F456}",period:"morning"});

      else if(c2==="Shopping") t.push({id:"dt_shop_"+o.id,text:early?"Write this week's shopping list":"Walk to a nearby shop for 1-2 items",detail:early?"Group items by aisle. Use delivery if needed.":"Take walking aid. Use rucksack not carrier bags.",cat:"ADL",icon:"\u{1F6D2}",period:"afternoon"});
      else if(c2==="Laundry") t.push({id:"dt_laun_"+o.id,text:"Put a small wash load on",detail:"Place basket on table to avoid bending. Hang items at waist height.",cat:"ADL",icon:"\u{1F455}",period:"afternoon"});
      else if(c2==="Community") t.push({id:"dt_comm_"+o.id,text:early?"Step outside for 5 minutes fresh air":"Walk to a local cafe or neighbour",detail:early?"Brief time outdoors improves mood. Stay near home.":"Plan flat route. Rest on benches.",cat:"ADL",icon:"\u{1F331}",period:"afternoon"});

    }
  });
  t.push({id:"dt_mindcheck",text:"Check in with your mind & body map",detail:"Take a moment to notice where you're holding tension or stress today.",cat:"Wellbeing",icon:"\u{1F9D8}",period:"morning"});

    t.push({id:"dt_d1",text:"Ice and elevate your "+j+" for 15 minutes",detail:"Wrap ice in towel. Elevate on cushions.",cat:"Recovery",icon:"\u{1F9CA}",period:"afternoon"});

  }
  outcomes.forEach(function(o){if(o.cat==="ADL: Meal Prep"){t.push({id:"dt_evening_meal",text:"Prepare your evening meal",detail:"Use perching stool if standing tires you. Keep it simple — batch cooking saves energy.",cat:"ADL",icon:"\u{1F37D}️",period:"evening"});}});

function BMap(props){
  var bm=props.zones||{},onTap=props.onTap,surg=props.surg,side=props.side;
  var bodyZones=WELLBEING_ZONES.slice();
  // Add surgical zone dynamically
  var surgId=surg==="THR"?(side==="Left"?"lh":"rh"):(side==="Left"?"lk":"rk");
  var surgY=surg==="THR"?54:72;
  var surgX=side==="Left"?43:57;
  if(surg&&side){
    bodyZones.push({id:surgId,lb:"Your Operated Area",x:surgX,y:surgY,prompt:"Frustration with recovery, fear of re-injury, loss of confidence"});
  }

  /* Determine surgical zone auto-mark */
  var surgZone=(surg&&side)?surgId:null;

  var ds=34;
  return(<div style={{position:"relative",width:"100%",margin:"0 auto"}}>
    <img src={BODY_IMG} alt="Human body outline with interactive zones for wellbeing tracking" style={{width:"100%",height:"auto",display:"block"}}/>
    {bodyZones.map(function(z){
      var manual=bm[z.id]?bm[z.id].status:null;
      var isSurg=z.id===surgZone;
      var st2=manual||(isSurg?"amber":null);
      var col=st2==="red"?C.r:st2==="amber"?C.a:st2==="green"?C.g:null;
      var tipText=z.lb+(st2==="red"?" — struggling":st2==="amber"?" — noticing":st2==="green"?" — feeling OK":"");return(<div key={z.id} role="button" tabIndex={0} aria-label={tipText} title={tipText} onClick={function(){if(onTap)onTap(z.id);}} onKeyDown={function(e){if((e.key==="Enter"||e.key===" ")&&onTap){e.preventDefault();onTap(z.id);}}} onMouseEnter={function(e){e.currentTarget.style.transform="scale(1.15)";}} onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}} onFocus={function(e){e.currentTarget.style.transform="scale(1.15)";}} onBlur={function(e){e.currentTarget.style.transform="scale(1)";}} style={{position:"absolute",left:"calc("+z.x+"% - "+ds/2+"px)",top:"calc("+z.y+"% - "+ds/2+"px)",width:ds,height:ds,borderRadius:"50%",background:col||"rgba(255,255,255,.5)",border:"2.5px solid "+(col||"rgba(255,255,255,.7)"),boxShadow:col?"0 0 0 4px "+col+"35":"0 1px 4px rgba(0,0,0,.18)",cursor:"pointer",zIndex:2,transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center"}}>{isSurg&&!manual&&<span style={{fontSize:9,color:C.w,fontWeight:800}}>{"♡"}</span>}</div>);
    })}
    {bodyZones.map(function(z){
      var manual=bm[z.id]?bm[z.id].status:null;
      var isSurg=z.id===surgZone;
      if(!manual&&!isSurg)return null;
      var isGreen=manual==="green";
      return(<div key={"lb_"+z.id} aria-hidden="true" style={{position:"absolute",left:z.x+"%",top:"calc("+z.y+"% + "+(ds/2+3)+"px)",transform:"translateX(-50%)",fontSize:10,fontWeight:700,color:isGreen?C.tx:C.w,textShadow:isGreen?"0 1px 2px rgba(255,255,255,.8), 0 0 4px rgba(255,255,255,.6)":"0 1px 2px rgba(0,0,0,.75), 0 0 4px rgba(0,0,0,.6)",whiteSpace:"nowrap",pointerEvents:"none",zIndex:3,letterSpacing:.2}}>{z.lb}</div>);
    })}
  </div>);
}

function Scanner(props){
  var surg=props.surg,onDone=props.onDone;
  var rmS=useState(null);var rm=rmS[0],setRm=rmS[1];
  var phS=useState("pick");var ph=phS[0],setPh=phS[1];
  var imgS=useState(null);var imgData=imgS[0],setImgData=imgS[1];
  var imgPrevS=useState(null);var imgPrev=imgPrevS[0],setImgPrev=imgPrevS[1];
  var imgTypeS=useState("image/jpeg");var imgType=imgTypeS[0],setImgType=imgTypeS[1];
  var resS=useState(null);var aiResult=resS[0],setAiResult=resS[1];
  var loadS=useState(false);var loading=loadS[0],setLoading=loadS[1];
  var errS=useState(null);var error=errS[0],setError=errS[1];
  var doneRoomsS=useState([]);var doneRooms=doneRoomsS[0],setDoneRooms=doneRoomsS[1];
  var fileRef=useRef(null);
  var j=surg==="THR"?"hip":"knee";
  var jFull=surg==="THR"?"hip replacement":"knee replacement";

  var pc=function(pr){return pr==="Essential"?C.r:pr==="Recommended"?C.a:C.g;};

  var handleFile=function(e){
    var file=e.target.files?e.target.files[0]:null;
    if(!file)return;
    if(file.size>4*1024*1024){setError("Photo too large \u2014 please use a lower resolution image (under 4MB)");setPh("error");e.target.value="";return;}
    var reader=new FileReader();
    reader.onload=function(){
      setImgPrev(reader.result);
      setImgData(reader.result.split(",")[1]);
      setImgType(file.type||"image/jpeg");
      setPh("preview");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  var analyseRoom=function(){
    if(!imgData||!rm)return;
    setLoading(true);setError(null);
    var prompt="You are an NHS Occupational Therapist conducting a home safety assessment for a patient recovering from a "+jFull+". Analyse this photo of their "+rm+" and return ONLY valid JSON (no markdown, no backticks).\n\nIdentify:\n1. Safety hazards (rugs, cables, clutter, poor lighting, wet surfaces)\n2. Missing essential equipment for post-surgical recovery\n3. Recommended aids and adaptations\n4. Positive features already in place\n\nReturn this exact JSON structure:\n{\"roomType\":\""+rm+"\",\"summary\":\"2-3 sentence overview of the room's safety and suitability\",\"hazards\":[{\"item\":\"string\",\"risk\":\"string\",\"action\":\"string\"}],\"equipmentNeeded\":[{\"name\":\"string\",\"category\":\"Safety|Equipment|Layout\",\"priority\":\"Essential|Recommended|Optional\",\"reason\":\"string\"}],\"positives\":[\"string\"],\"overallRisk\":\"Low|Medium|High\"}\n\nBe specific to what you can see. If you cannot clearly see the room, still provide general "+rm+" safety advice for "+jFull+" recovery.";

    var ac=new AbortController();
    var timeout=setTimeout(function(){ac.abort();},20000);
    fetch("https://api.anthropic.com/v1/messages",{
      signal:ac.signal,
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:imgType,data:imgData}},
          {type:"text",text:prompt}
        ]}]
      })
    }).then(function(r){
      clearTimeout(timeout);

    }).catch(function(e2){
      clearTimeout(timeout);
      var msg=e2.name==="AbortError"?"Analysis timed out. Use the manual checklist below instead.":e2.message||"Analysis failed";

    </div>);})}

  </div>);

    <input ref={filePickRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={function(e){handleFileUpload(e,docUpType);}}/>
    <input ref={camPickRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={function(e){handleFileUpload(e,docUpType);}}/>
    {docJustUploaded&&<Cd style={{background:"linear-gradient(135deg,"+C.g+",#66BB6A)",border:"none"}}><div style={{display:"flex",gap:10,alignItems:"center"}}><div style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{"\u2713"}</div><div style={{flex:1,color:C.w}}><div style={{fontSize:14,fontWeight:700}}>Document processed!</div><div style={{fontSize:12,opacity:.9,marginTop:2}}>Your recovery guide will update automatically.</div></div></div><button onClick={function(){setDocJustUploaded(false);setSupportPlan(null);}} style={{width:"100%",marginTop:10,background:"rgba(255,255,255,.25)",color:C.w,border:"2px solid rgba(255,255,255,.5)",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Update Recovery Guide</button></Cd>}
    {docProcessing&&<Cd style={{textAlign:"center",padding:24}}><div style={{fontSize:36,marginBottom:10,animation:"spin 1.5s linear infinite"}}><style>{"@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}"}</style>{"\u{1F4C4}"}</div><div style={{fontSize:15,fontWeight:700}}>Reading your document...</div><div style={{fontSize:12,color:C.tl,marginTop:4}}>Reading medications, dates, and key details</div></Cd>}
    {[{type:"Discharge summary",ic:"\u{1F3E5}",desc:"Your hospital discharge letter"},{type:"Hospital paperwork",ic:"\u{1F4CB}",desc:"Any other hospital documents"}].map(function(dt){return(<Cd key={dt.type} style={{padding:16}}>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}><span style={{fontSize:24}}>{dt.ic}</span><div><div style={{fontSize:14,fontWeight:700}}>{dt.type}</div><div style={{fontSize:12,color:C.tl}}>{dt.desc}</div></div></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={function(){setDocUpType(dt.type);setTimeout(function(){if(filePickRef.current)filePickRef.current.click();},50);}} style={{flex:1,padding:12,borderRadius:12,border:"2px solid "+C.p,background:C.w,color:C.p,fontSize:13,fontWeight:600,cursor:"pointer"}}>Upload</button>
        <button onClick={function(){setDocUpType(dt.type);setTimeout(function(){if(camPickRef.current)camPickRef.current.click();},50);}} style={{flex:1,padding:12,borderRadius:12,border:"none",background:C.p,color:C.w,fontSize:13,fontWeight:600,cursor:"pointer"}}>Scan</button>
      </div>
    </Cd>);})}
    {uploadedDocs.length>0&&<div><div style={{fontSize:14,fontWeight:700,marginTop:8,marginBottom:10}}>Uploaded Documents</div>
      {uploadedDocs.map(function(doc){return(<Cd key={doc.id} style={{borderLeft:"4px solid "+(doc.error?C.r:C.g)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:14,fontWeight:700}}>{doc.type}</div><span style={{fontSize:10,color:C.tl}}>{doc.uploadDate}</span></div>
        {doc.summary&&<div style={{fontSize:13,color:C.tl,lineHeight:1.5,marginTop:4}}>{doc.summary}</div>}
        {doc.medications&&doc.medications.length>0&&<div style={{marginTop:8,background:"#F3E8FA",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:11,fontWeight:700,color:C.p,marginBottom:3}}>{"\u{1F48A} Medications"}</div>{doc.medications.map(function(m,mi){var txt=typeof m==="string"?m:m&&typeof m==="object"?Object.values(m).filter(function(v){return typeof v==="string";}).join(" \u2014 "):"";return(<div key={mi} style={{fontSize:11,color:C.tx,lineHeight:1.4}}>{"\u2022 "+txt}</div>);})}</div>}
        {doc.followUp&&doc.followUp.length>0&&<div style={{marginTop:6,background:"#E3F2FD",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:11,fontWeight:700,color:"#1565C0",marginBottom:3}}>{"\u{1F4C5} Follow-up"}</div>{doc.followUp.map(function(fu,fi){var txt=typeof fu==="string"?fu:fu&&typeof fu==="object"?Object.values(fu).filter(function(v){return typeof v==="string";}).join(" \u2014 "):"";return(<div key={fi} style={{fontSize:11,color:C.tx,lineHeight:1.4}}>{"\u2022 "+txt}</div>);})}</div>}
        {doc.keyPoints&&doc.keyPoints.length>0&&!doc.medications&&<div style={{marginTop:6}}>{doc.keyPoints.map(function(kp,ki){return(<div key={ki} style={{fontSize:11,color:C.tl,lineHeight:1.4,padding:"1px 0"}}><span style={{fontWeight:600}}>{kp.category}:</span> {kp.detail}</div>);})}</div>}
        <div onClick={function(){setUploadedDocs(function(p){return p.filter(function(d){return d.id!==doc.id;});});}} style={{fontSize:12,color:C.r,cursor:"pointer",marginTop:8,textAlign:"right"}}>Remove</div>
      </Cd>);})}
    </div>}
    {uploadedDocs.length===0&&<div style={{fontSize:12,color:C.tl,textAlign:"center",marginTop:8}}>Upload your discharge letters or hospital paperwork to keep everything in one place.</div>}
  </div><Nav active="more" onNav={handleNav} coachName={coachName}/></Frame>);

  /* ═══ HELP ═══ */
  if(scr==="coach")return(<Frame><Hdr title={coachName} sub="Your recovery coach"/><div style={{flex:1,display:"flex",flexDirection:"column"}}>
    <div ref={chatRef} style={{flex:1,overflow:"auto",padding:"10px 14px"}}>{msgs.map(function(m,i2){return(<div key={i2} style={{display:"flex",justifyContent:m.f==="u"?"flex-end":"flex-start",marginBottom:8}}><div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.f==="u"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.f==="u"?C.p:"#F0ECF5",color:m.f==="u"?C.w:C.tx,fontSize:13,lineHeight:1.5}}>{m.t}</div></div>);})}{chatLoading&&<div style={{display:"flex",justifyContent:"flex-start",marginBottom:8}}><div style={{padding:"10px 14px",borderRadius:"16px 16px 16px 4px",background:"#F0ECF5",color:C.tl,fontSize:13}}>{coachName+" is typing..."}</div></div>}</div>
    <div style={{borderTop:"1px solid #E8E0ED",padding:"10px 14px",display:"flex",gap:8,flexShrink:0}}><input value={chatVal} onChange={function(e){setChatVal(e.target.value);}} onClick={function(e){e.stopPropagation();}} onKeyDown={function(e){if(e.key==="Enter"){e.preventDefault();sendChat();}}} placeholder={chatLoading?coachName+" is thinking...":"Ask about your recovery..."} style={{flex:1,padding:"10px 14px",borderRadius:24,border:"2px solid #E8E0ED",fontSize:14,outline:"none",opacity:chatLoading?0.5:1}} disabled={chatLoading}/><button onClick={chatLoading?undefined:sendChat} aria-label="Send message" style={{width:40,height:40,borderRadius:"50%",background:chatVal.trim()&&!chatLoading?C.p:"#E8E0ED",color:C.w,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:chatVal.trim()&&!chatLoading?"pointer":"default",border:"none",padding:0}}>{"\u2191"}</button></div>
    <div style={{fontSize:10,color:C.tl,textAlign:"center",padding:"6px 14px",borderTop:"1px solid #E8E0ED",flexShrink:0}}>This is an AI assistant, not a medical professional. In crisis call Samaritans 116 123 or NHS 111 option 2.</div>
  </div><Nav active="coach" onNav={handleNav} coachName={coachName}/></Frame>);
  if(scr==="help"){
    if(selRes){var r2=RES.find(function(x){return x.id===selRes;});return(<Frame><Hdr title={r2?r2.t:""} back={function(){setSelRes(null);}}/><div ref={scrollRef} style={{flex:1,overflow:"auto",padding:"14px 18px 20px"}}><Cd><div style={{fontSize:14,lineHeight:1.6}}>{r2?r2.d:""}</div></Cd></div><Nav active="more" onNav={handleNav} coachName={coachName}/></Frame>);}
    return(<Frame><Hdr title="Support"/><div ref={scrollRef} style={{flex:1,overflow:"auto",padding:"14px 18px 20px"}}>
      <Cd style={{background:C.pp,border:"2px solid "+C.pl}}><div style={{fontSize:13,lineHeight:1.6}}>{"\u{1F3E5} If you have any medical concerns about your recovery, contact your GP, call NHS 111, or in an emergency call 999."}</div></Cd>
      <Cd style={{background:"#FFF3E0",border:"2px solid "+C.a}}><div style={{fontSize:14,fontWeight:700,marginBottom:6}}>Need to talk to someone?</div><div style={{fontSize:12,lineHeight:1.8}}><a href="tel:116123" style={{color:C.tx,textDecoration:"none"}}>Samaritans: <strong>116 123</strong> (free, 24/7)</a><br/><span>NHS 111: press option 2 for mental health</span><br/><a href="sms:85258" style={{color:C.tx,textDecoration:"none"}}>Text <strong>SHOUT</strong> to 85258</a><br/><a href="tel:999" style={{color:C.tx,textDecoration:"none"}}>In an emergency call <strong>999</strong></a></div></Cd>
      <Cd onClick={function(){go("coach");}} style={{background:C.pp,border:"2px solid "+C.pl,cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:38,height:38,borderRadius:"50%",background:C.p,color:C.w,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{coachName.substring(0,2).toUpperCase()}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.p}}>{"Chat with "+coachName}</div><div style={{fontSize:11,color:C.tl}}>Your recovery coach</div></div><span style={{color:C.pl,fontSize:18}}>{"\u203A"}</span></div></Cd>
      <div style={{fontSize:15,fontWeight:700,marginTop:14,marginBottom:10}}>Resources</div>
      {RES.map(function(r3){return(<Cd key={r3.id} onClick={function(){setSelRes(r3.id);}} style={{padding:12}}><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:20}}>{r3.i}</span><div style={{flex:1,fontSize:13,fontWeight:600}}>{r3.t}</div><span style={{color:"#CCC"}}>{"\u203A"}</span></div></Cd>);})}
    </div><Nav active="more" onNav={handleNav} coachName={coachName}/></Frame>);}

  /* ═══ PLAN UPDATED OVERLAY ═══ */
  
  return(<Frame><div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><Btn onClick={function(){go("home");}}>Dashboard</Btn></div></Frame>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
